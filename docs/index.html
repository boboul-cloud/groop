<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Commande en ligne</title>
<style>
:root{--ocean:#1B6B93;--seafoam:#4ECDC4;--sand:#F7F3E9;--coral:#FF6B6B}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--sand);color:#333;min-height:100vh}
.header{background:linear-gradient(135deg,var(--ocean),#2a9d8f);color:#fff;padding:24px 16px;text-align:center}
.header h1{font-size:1.5em;margin-bottom:4px}
.header p{opacity:.85;font-size:.9em}
.container{max-width:600px;margin:0 auto;padding:16px}
.card{background:#fff;border-radius:16px;padding:16px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.card h2{font-size:1.1em;color:var(--ocean);margin-bottom:12px;display:flex;align-items:center;gap:8px}
label{display:block;font-weight:500;margin-bottom:6px;font-size:.9em}
input[type=text],input[type=tel]{width:100%;padding:10px 12px;border:1.5px solid #ddd;border-radius:10px;font-size:1em;transition:border-color .2s}
input:focus{outline:none;border-color:var(--ocean)}
.variante{border:1.5px solid #e8e8e8;border-radius:14px;padding:14px;margin-bottom:12px;transition:border-color .2s}
.variante.active{border-color:var(--seafoam);background:rgba(78,205,196,.05)}
.var-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.var-name{font-weight:600;font-size:1.05em}
.var-price{color:var(--ocean);font-weight:600;font-size:.95em}
.options{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.chip{padding:6px 14px;border-radius:20px;border:1.5px solid #ddd;background:#fff;font-size:.85em;cursor:pointer;transition:all .2s;user-select:none}
.chip.selected{background:var(--seafoam);color:#fff;border-color:var(--seafoam)}
.qty-row{display:flex;align-items:center;gap:10px;margin-top:8px}
.qty-btn{width:36px;height:36px;border-radius:50%;border:none;font-size:1.2em;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.qty-btn.minus{background:var(--coral);color:#fff}
.qty-btn.plus{background:var(--seafoam);color:#fff}
.qty-btn:disabled{opacity:.3}
.qty-val{font-size:1.1em;font-weight:600;min-width:50px;text-align:center}
.size-line{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #f0f0f0}
.size-line:last-child{border-bottom:none}
.size-name{font-weight:500;min-width:60px;font-size:.95em}
.size-price{font-size:.8em;color:var(--ocean);min-width:55px}
.submit-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--ocean),#2a9d8f);color:#fff;border:none;border-radius:14px;font-size:1.05em;font-weight:600;cursor:pointer;transition:transform .1s}
.submit-btn:active{transform:scale(.97)}
.submit-btn:disabled{opacity:.4}
.recap{background:rgba(78,205,196,.08);border-radius:12px;padding:12px;margin-bottom:12px;font-size:.9em}
.recap-line{display:flex;justify-content:space-between;padding:4px 0}
.total-line{font-weight:700;color:var(--ocean);border-top:1px solid #ddd;margin-top:6px;padding-top:6px}
.success{text-align:center;padding:40px 16px}
.success h2{color:var(--seafoam);margin-bottom:12px}
.hidden{display:none}
.field-group{margin-bottom:12px}
.attr-label{font-size:.8em;color:#888;margin-bottom:4px;font-weight:500}
.error{text-align:center;padding:60px 16px}
.error h2{color:var(--coral);margin-bottom:8px}
</style>
</head>
<body>
<div id="headerEl" class="header">
  <h1 id="titre">Commande</h1>
  <p>Formulaire de commande</p>
</div>

<div class="container" id="errorSection" class="hidden">
</div>

<div class="container hidden" id="formSection">
  <div class="card">
    <h2>&#x1F4CB; Vos coordonn&eacute;es</h2>
    <div class="field-group">
      <label for="nom">Nom</label>
      <input type="text" id="nom" placeholder="Votre nom" autocomplete="name">
    </div>
    <div class="field-group">
      <label for="tel">T&eacute;l&eacute;phone <span style="color:#e74c3c">*</span></label>
      <input type="tel" id="tel" placeholder="06 12 34 56 78" autocomplete="tel" required>
      <p style="font-size:.75em;color:#888;margin:4px 0 0">Indispensable pour vous identifier aupr&egrave;s du vendeur.</p>
    </div>
  </div>
  <div class="card">
    <h2>&#x1F6D2; Votre commande</h2>
    <div id="variantes"></div>
  </div>
  <div id="recapCard" class="card hidden">
    <h2>&#x1F4CA; R&eacute;capitulatif</h2>
    <div id="recap" class="recap"></div>
  </div>
  <button class="submit-btn" id="submitBtn" disabled onclick="soumettre()">&#x1F4E9; Envoyer la commande</button>
</div>

<script>
(function(){
  // Lire les données de la campagne depuis le hash de l'URL
  var hash = window.location.hash.substring(1);
  if (!hash) {
    document.getElementById("errorSection").innerHTML =
      '<div class="card error"><h2>&#x26A0;&#xFE0F; Lien invalide</h2><p>Ce lien ne contient pas de donn&eacute;es de campagne. Demandez un nouveau lien au vendeur.</p></div>';
    return;
  }

  // Décodage base64url
  function b64urlDecode(s) {
    var b = s.replace(/-/g, '+').replace(/_/g, '/');
    while (b.length % 4) b += '=';
    return atob(b);
  }

  // Parse le format compact v1 : "1|titre|unite|nom~prix~t1,t2~c1,c2|..."
  // ou v2 : "2|titre|unite|telVendeur|nom~prix~t1;t2~c1;c2|..."
  // ou v3 : "3|titre|unite|telVendeur|nom~prix~tailles~couleurs~combinaisons|..."
  // v3 ajoute prixCouleurs et prixCombinaisons
  // Séparateur tailles/couleurs : ";" (v2+) avec fallback "," (v1)
  function parseCompact(str) {
    var seg = str.split('|');
    var ver = parseInt(seg[0]);
    if (ver !== 1 && ver !== 2 && ver !== 3) return null;
    var cfg = { t: seg[1], u: seg[2], v: [], p: '' };
    var startIdx = 3;
    if (ver >= 2) {
      cfg.p = seg[3] || '';
      startIdx = 4;
    }
    for (var i = startIdx; i < seg.length; i++) {
      var f = seg[i].split('~');
      var v = { n: f[0], x: parseFloat(f[1]) || 0, tp: {}, cp: {}, xp: {} };
      if (f[2]) {
        var sep = f[2].indexOf(';') >= 0 ? ';' : ',';
        var rawTailles = f[2].split(sep);
        v.ta = [];
        rawTailles.forEach(function(t) {
          var parts = t.split(':');
          var nom = parts[0];
          if (nom) {
            v.ta.push(nom);
            if (parts.length > 1 && parts[1]) {
              v.tp[nom] = parseFloat(parts[1]);
            }
          }
        });
      }
      if (f[3]) {
        var sepC = f[3].indexOf(';') >= 0 ? ';' : ',';
        var rawCouleurs = f[3].split(sepC);
        v.co = [];
        rawCouleurs.forEach(function(c) {
          var parts = c.split(':');
          var nom = parts[0];
          if (nom) {
            v.co.push(nom);
            if (parts.length > 1 && parts[1]) {
              v.cp[nom] = parseFloat(parts[1]);
            }
          }
        });
      }
      // combinaisons taille+couleur avec prix (5e champ ~)
      if (f[4]) {
        var rawCombos = f[4].split(';');
        rawCombos.forEach(function(combo) {
          var parts = combo.split(':');
          var cle = parts[0]; // "taille+couleur"
          if (cle && parts.length > 1 && parts[1]) {
            v.xp[cle] = parseFloat(parts[1]);
          }
        });
      }
      cfg.v.push(v);
    }
    return cfg;
  }

  function showError(msg) {
    document.getElementById('errorSection').innerHTML =
      '<div class="card error"><h2>&#x26A0;&#xFE0F; Erreur</h2><p>' + msg + '</p></div>';
  }

  // Décoder le hash : format compact base64url ou legacy JSON
  var config;
  try {
    var decoded = decodeURIComponent(escape(b64urlDecode(hash)));
    // Essayer format compact v1
    config = parseCompact(decoded);
    // Sinon legacy JSON
    if (!config) {
      config = JSON.parse(decoded);
    }
  } catch(e) {
    showError('Impossible de lire les donn&eacute;es. Demandez un nouveau lien au vendeur.');
    return;
  }
  if (!config || !config.v) {
    showError('Donn&eacute;es invalides.');
    return;
  }
  boot(config);

  function boot(config) {
    var VARIANTES = config.v || [];
    var UNITE = config.u || 'kg';
    var TITRE = config.t || 'Commande';
    var INC = (UNITE === 'kg') ? 0.5 : 1;
    var TEL_VENDEUR = config.p || '';

  document.getElementById("titre").textContent = TITRE;
  document.title = TITRE + " — Commande";
  document.getElementById("formSection").classList.remove("hidden");
  document.getElementById("errorSection").classList.add("hidden");

  // State : liste plate de lignes de commande
  // Chaque ligne = {nom, taille (ou null), couleur (ou null), quantite, varIdx}
  var state = [];
  VARIANTES.forEach(function(v, i) {
    if (v.ta && v.ta.length) {
      v.ta.forEach(function(t) {
        state.push({nom: v.n, taille: t, couleur: null, quantite: 0, varIdx: i});
      });
    } else {
      state.push({nom: v.n, taille: null, couleur: null, quantite: 0, varIdx: i});
    }
  });

  function init(){
    var c = document.getElementById("variantes");
    var html = "";
    VARIANTES.forEach(function(v, i){
      html += '<div class="variante" id="var_'+i+'">';
      html += '<div class="var-header"><span class="var-name">'+esc(v.n)+'</span><span class="var-price">'+v.x.toFixed(2)+' &euro;'+(UNITE==='kg'?'/kg':'')+'</span></div>';

      if (v.ta && v.ta.length) {
        // Une ligne quantité par taille
        v.ta.forEach(function(t) {
          var si = stateIndexFor(i, t);
          var prix = (v.tp[t] !== undefined) ? v.tp[t] : v.x;
          html += '<div class="size-line">';
          html += '<span class="size-name">'+esc(t)+'</span>';
          if (v.tp[t] !== undefined) {
            html += '<span class="size-price">'+prix.toFixed(2)+'&euro;</span>';
          } else {
            html += '<span class="size-price"></span>';
          }
          if (v.co && v.co.length) {
            html += '<select id="color_'+si+'" onchange="selColorLine('+si+')" style="font-size:.8em;border-radius:8px;border:1px solid #ddd;padding:4px;max-width:100px">';
            html += '<option value="">Couleur</option>';
            v.co.forEach(function(cl){
              var clLabel = cl;
              if (v.cp && v.cp[cl] !== undefined) clLabel += ' ('+v.cp[cl].toFixed(2)+'€)';
              html += '<option value="'+esc(cl)+'">'+esc(clLabel)+'</option>';
            });
            html += '</select>';
          }
          html += '<div class="qty-row" style="margin:0;flex:1;justify-content:flex-end">';
          html += '<button class="qty-btn minus" style="width:30px;height:30px;font-size:1em" onclick="chgQty('+si+',-1)">&minus;</button>';
          html += '<span class="qty-val" id="qty_'+si+'" style="min-width:40px;font-size:.95em">0</span>';
          html += '<button class="qty-btn plus" style="width:30px;height:30px;font-size:1em" onclick="chgQty('+si+',1)">+</button>';
          html += '</div></div>';
        });
      } else {
        // Pas de tailles : couleur + quantité simple
        if (v.co && v.co.length) {
          var si0 = stateIndexFor(i, null);
          html += '<div class="attr-label">Couleur</div><div class="options">';
          v.co.forEach(function(cl){
            var clLabel = cl;
            if (v.cp && v.cp[cl] !== undefined) clLabel += ' ('+v.cp[cl].toFixed(2)+'€)';
            html += '<div class="chip" onclick="selCouleur('+si0+',this,\''+esc(cl)+'\')">' +esc(clLabel)+'</div>';
          });
          html += '</div>';
        }
        var si1 = stateIndexFor(i, null);
        html += '<div class="qty-row"><button class="qty-btn minus" onclick="chgQty('+si1+',-1)">&minus;</button>';
        html += '<span class="qty-val" id="qty_'+si1+'">0</span>';
        html += '<button class="qty-btn plus" onclick="chgQty('+si1+',1)">+</button></div>';
      }
      html += '</div>';
    });
    c.innerHTML = html;
  }

  function stateIndexFor(varIdx, taille) {
    for (var s = 0; s < state.length; s++) {
      if (state[s].varIdx === varIdx && state[s].taille === taille) return s;
    }
    return -1;
  }

  function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
  function fmtQte(q){ return UNITE==="kg" ? q.toFixed(1)+" kg" : q.toFixed(0); }

  window.selCouleur = function(si, el, cl){
    state[si].couleur = state[si].couleur===cl ? null : cl;
    el.parentElement.querySelectorAll(".chip").forEach(function(c){c.classList.remove("selected");});
    if(state[si].couleur) el.classList.add("selected");
    update();
  };
  window.selColorLine = function(si){
    var sel = document.getElementById("color_"+si);
    state[si].couleur = sel.value || null;
    update();
  };
  window.chgQty = function(si, d){
    state[si].quantite = Math.max(0, +(state[si].quantite + d*INC).toFixed(2));
    update();
  };

  // Retourne le prix effectif pour une variante : combinaison > couleur > taille > base
  function prixPourVariante(v, taille, couleur) {
    // 1) Prix combinaison taille+couleur
    if (taille && couleur && v.xp) {
      var cle = taille + '+' + couleur;
      if (v.xp[cle] !== undefined) return v.xp[cle];
    }
    // 2) Prix couleur
    if (couleur && v.cp && v.cp[couleur] !== undefined) return v.cp[couleur];
    // 3) Prix taille
    if (taille && v.tp && v.tp[taille] !== undefined) return v.tp[taille];
    // 4) Prix de base
    return v.x;
  }

  function prixPourLigne(si) {
    var s = state[si];
    return prixPourVariante(VARIANTES[s.varIdx], s.taille, s.couleur);
  }

  function update(){
    var total=0, any=false, recapH="";
    // Vérifier activité par variante
    var varActive = {};
    state.forEach(function(s, si){
      var q = s.quantite;
      var qEl = document.getElementById("qty_"+si);
      if (qEl) qEl.textContent = q > 0 ? fmtQte(q) : "0";
      if (q > 0) {
        any = true;
        varActive[s.varIdx] = true;
        var prix = prixPourLigne(si);
        var st = prix * q; total += st;
        var desc = s.nom;
        if (s.taille) desc += " — " + s.taille;
        if (s.couleur) desc += " — " + s.couleur;
        recapH += '<div class="recap-line"><span>'+esc(desc)+' &times; '+fmtQte(q)+'</span><span>'+st.toFixed(2)+' &euro;</span></div>';
      }
    });
    VARIANTES.forEach(function(v, i){
      var el = document.getElementById("var_"+i);
      if (varActive[i]) { el.classList.add("active"); } else { el.classList.remove("active"); }
    });
    var rc = document.getElementById("recapCard");
    if(any){
      recapH += '<div class="recap-line total-line"><span>Total</span><span>'+total.toFixed(2)+' &euro;</span></div>';
      document.getElementById("recap").innerHTML = recapH;
      rc.classList.remove("hidden");
    } else {
      rc.classList.add("hidden");
    }
    var nom = document.getElementById("nom").value.trim();
    var tel = document.getElementById("tel").value.trim();
    document.getElementById("submitBtn").disabled = !(any && nom && tel);
  }

  document.getElementById("nom").addEventListener("input", update);
  document.getElementById("tel").addEventListener("input", update);

  window.soumettre = function(){
    var nom = document.getElementById("nom").value.trim();
    var tel = document.getElementById("tel").value.trim();
    var lignes = [];
    state.forEach(function(s){
      if(s.quantite > 0){
        var l = {v:s.nom, q:s.quantite};
        if(s.taille) l.t = s.taille;
        if(s.couleur) l.c = s.couleur;
        lignes.push(l);
      }
    });
    var data = JSON.stringify({n:nom, p:tel, l:lignes});
    var encoded = btoa(unescape(encodeURIComponent(data)));
    var deepUrl = "groop://order?d=" + encodeURIComponent(encoded);

    // Récap texte pour le SMS
    var recap = lignes.map(function(l){
      var d = l.v;
      if(l.t) d += " " + l.t;
      if(l.c) d += " " + l.c;
      return d + " x" + fmtQte(l.q);
    }).join(", ");
    var smsBody = "Commande " + nom + (tel ? " ("+tel+")" : "") + " : " + recap + "\n" + deepUrl;
    var smsHref = "sms:" + (TEL_VENDEUR||'') + "&body=" + encodeURIComponent(smsBody);

    // Calculer le total pour la confirmation
    var total = 0;
    lignes.forEach(function(l){
      VARIANTES.forEach(function(v){
        if(v.n===l.v){
          total += prixPourVariante(v, l.t||null, l.c||null) * l.q;
        }
      });
    });

    if (TEL_VENDEUR) {
      // Afficher la confirmation avant d'ouvrir SMS
      document.getElementById("formSection").classList.add("hidden");
      var successHtml = '<div class="card success">';
      successHtml += '<div style="font-size:3em;margin-bottom:12px">&#x2705;</div>';
      successHtml += '<h2>Commande prête !</h2>';
      successHtml += '<p style="margin-bottom:16px">Votre commande va s\'ouvrir dans l\'app Messages. Envoyez le SMS pour confirmer.</p>';
      successHtml += '<div class="recap" style="text-align:left;margin-bottom:16px">';
      lignes.forEach(function(l){
        var d = l.v;
        if(l.t) d += " — " + l.t;
        if(l.c) d += " — " + l.c;
        var lPrix = 0;
        VARIANTES.forEach(function(v){
          if(v.n===l.v){
            lPrix = prixPourVariante(v, l.t||null, l.c||null);
          }
        });
        successHtml += '<div class="recap-line"><span>'+esc(d)+' &times; '+fmtQte(l.q)+'</span><span>'+( lPrix*l.q).toFixed(2)+' &euro;</span></div>';
      });
      successHtml += '<div class="recap-line total-line"><span>Total</span><span>'+total.toFixed(2)+' &euro;</span></div>';
      successHtml += '</div>';
      successHtml += '<button class="submit-btn" onclick="window.location.href=\''+smsHref+'\'">&#x1F4E9; Ouvrir Messages</button>';
      successHtml += '<p style="margin-top:12px;font-size:.8em;color:#888">Si rien ne se passe, <a href="'+smsHref+'">cliquez ici</a>.</p>';
      successHtml += '</div>';
      document.getElementById("errorSection").innerHTML = successHtml;
      document.getElementById("errorSection").classList.remove("hidden");
      // Ouvrir SMS après un court délai
      setTimeout(function(){ window.location.href = smsHref; }, 800);
    } else if (navigator.share) {
      navigator.share({ text: smsBody }).catch(function(){});
    }
  };

  init();
  } // fin boot()
})();
</script>
</body>
</html>

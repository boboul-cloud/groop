<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Commande en ligne</title>
<style>
:root{--ocean:#1B6B93;--seafoam:#4ECDC4;--sand:#F7F3E9;--coral:#FF6B6B}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--sand);color:#333;min-height:100vh}
.header{background:linear-gradient(135deg,var(--ocean),#2a9d8f);color:#fff;padding:24px 16px;text-align:center}
.header h1{font-size:1.5em;margin-bottom:4px}
.header p{opacity:.85;font-size:.9em}
.container{max-width:600px;margin:0 auto;padding:16px}
.card{background:#fff;border-radius:16px;padding:16px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.card h2{font-size:1.1em;color:var(--ocean);margin-bottom:12px;display:flex;align-items:center;gap:8px}
label{display:block;font-weight:500;margin-bottom:6px;font-size:.9em}
input[type=text],input[type=tel]{width:100%;padding:10px 12px;border:1.5px solid #ddd;border-radius:10px;font-size:1em;transition:border-color .2s}
input:focus{outline:none;border-color:var(--ocean)}
.variante{border:1.5px solid #e8e8e8;border-radius:14px;padding:14px;margin-bottom:12px;transition:border-color .2s}
.variante.active{border-color:var(--seafoam);background:rgba(78,205,196,.05)}
.var-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.var-name{font-weight:600;font-size:1.05em}
.var-price{color:var(--ocean);font-weight:600;font-size:.95em}
.options{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.chip{padding:6px 14px;border-radius:20px;border:1.5px solid #ddd;background:#fff;font-size:.85em;cursor:pointer;transition:all .2s;user-select:none}
.chip.selected{background:var(--seafoam);color:#fff;border-color:var(--seafoam)}
.qty-row{display:flex;align-items:center;gap:10px;margin-top:8px}
.qty-btn{width:36px;height:36px;border-radius:50%;border:none;font-size:1.2em;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.qty-btn.minus{background:var(--coral);color:#fff}
.qty-btn.plus{background:var(--seafoam);color:#fff}
.qty-btn:disabled{opacity:.3}
.qty-val{font-size:1.1em;font-weight:600;min-width:50px;text-align:center}
.submit-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--ocean),#2a9d8f);color:#fff;border:none;border-radius:14px;font-size:1.05em;font-weight:600;cursor:pointer;transition:transform .1s}
.submit-btn:active{transform:scale(.97)}
.submit-btn:disabled{opacity:.4}
.recap{background:rgba(78,205,196,.08);border-radius:12px;padding:12px;margin-bottom:12px;font-size:.9em}
.recap-line{display:flex;justify-content:space-between;padding:4px 0}
.total-line{font-weight:700;color:var(--ocean);border-top:1px solid #ddd;margin-top:6px;padding-top:6px}
.success{text-align:center;padding:40px 16px}
.success h2{color:var(--seafoam);margin-bottom:12px}
.hidden{display:none}
.field-group{margin-bottom:12px}
.attr-label{font-size:.8em;color:#888;margin-bottom:4px;font-weight:500}
.error{text-align:center;padding:60px 16px}
.error h2{color:var(--coral);margin-bottom:8px}
.sms-btn{width:100%;padding:14px;background:var(--seafoam);color:#fff;border:none;border-radius:14px;font-size:1.05em;font-weight:600;cursor:pointer;margin-top:12px;text-decoration:none;display:block;text-align:center}
</style>
</head>
<body>
<div id="headerEl" class="header">
  <h1 id="titre">Commande</h1>
  <p>Formulaire de commande</p>
</div>

<div class="container" id="errorSection" class="hidden">
</div>

<div class="container hidden" id="formSection">
  <div class="card">
    <h2>&#x1F4CB; Vos coordonn&eacute;es</h2>
    <div class="field-group">
      <label for="nom">Nom</label>
      <input type="text" id="nom" placeholder="Votre nom" autocomplete="name">
    </div>
    <div class="field-group">
      <label for="tel">T&eacute;l&eacute;phone</label>
      <input type="tel" id="tel" placeholder="06 12 34 56 78" autocomplete="tel">
    </div>
  </div>
  <div class="card">
    <h2>&#x1F6D2; Votre commande</h2>
    <div id="variantes"></div>
  </div>
  <div id="recapCard" class="card hidden">
    <h2>&#x1F4CA; R&eacute;capitulatif</h2>
    <div id="recap" class="recap"></div>
  </div>
  <button class="submit-btn" id="submitBtn" disabled onclick="soumettre()">Envoyer la commande</button>
</div>

<div class="container hidden" id="successSection">
  <div class="card success">
    <h2>&#x2705; Commande pr&ecirc;te !</h2>
    <p id="successMsg">Envoyez votre commande par SMS en appuyant ci-dessous.</p>
    <a id="smsLink" class="sms-btn" href="#">Envoyer par SMS</a>
    <p style="margin-top:16px;font-size:.85em;color:#888">Ou copiez ce lien et envoyez-le au vendeur :</p>
    <input type="text" id="deepLink" readonly style="margin-top:8px;text-align:center;font-size:.85em;background:#f0f0f0" onclick="this.select()">
  </div>
</div>

<script>
(function(){
  // Lire les données de la campagne depuis le hash de l'URL
  var hash = window.location.hash.substring(1);
  if (!hash) {
    document.getElementById("errorSection").innerHTML =
      '<div class="card error"><h2>&#x26A0;&#xFE0F; Lien invalide</h2><p>Ce lien ne contient pas de donn&eacute;es de campagne. Demandez un nouveau lien au vendeur.</p></div>';
    return;
  }

  var config;
  try {
    var b64 = hash.replace(/-/g, '+').replace(/_/g, '/');
    while (b64.length % 4) b64 += '=';
    var json = decodeURIComponent(escape(atob(b64)));
    config = JSON.parse(json);
  } catch(e) {
    document.getElementById("errorSection").innerHTML =
      '<div class="card error"><h2>&#x26A0;&#xFE0F; Erreur</h2><p>Impossible de lire les donn&eacute;es. Demandez un nouveau lien au vendeur.</p></div>';
    return;
  }

  var VARIANTES = config.v || [];
  var UNITE = config.u || "kg";
  var TITRE = config.t || "Commande";
  var INC = (UNITE === "kg") ? 0.5 : 1;
  var TEL_VENDEUR = config.p || "";

  document.getElementById("titre").textContent = TITRE;
  document.title = TITRE + " — Commande";
  document.getElementById("formSection").classList.remove("hidden");
  document.getElementById("errorSection").classList.add("hidden");

  var state = VARIANTES.map(function(v){ return {nom:v.n, taille:null, couleur:null, quantite:0}; });

  function init(){
    var c = document.getElementById("variantes");
    var html = "";
    VARIANTES.forEach(function(v, i){
      html += '<div class="variante" id="var_'+i+'">';
      html += '<div class="var-header"><span class="var-name">'+esc(v.n)+'</span><span class="var-price">'+v.x.toFixed(2)+' &euro;/'+esc(UNITE)+'</span></div>';
      if (v.ta && v.ta.length) {
        html += '<div class="attr-label">Taille</div><div class="options">';
        v.ta.forEach(function(t){ html += '<div class="chip" onclick="selTaille('+i+',this,\''+esc(t)+'\')">'+esc(t)+'</div>'; });
        html += '</div>';
      }
      if (v.co && v.co.length) {
        html += '<div class="attr-label">Couleur</div><div class="options">';
        v.co.forEach(function(cl){ html += '<div class="chip" onclick="selCouleur('+i+',this,\''+esc(cl)+'\')">'+esc(cl)+'</div>'; });
        html += '</div>';
      }
      html += '<div class="qty-row"><button class="qty-btn minus" onclick="chgQty('+i+',-1)">&minus;</button>';
      html += '<span class="qty-val" id="qty_'+i+'">0 '+esc(UNITE)+'</span>';
      html += '<button class="qty-btn plus" onclick="chgQty('+i+',1)">+</button></div></div>';
    });
    c.innerHTML = html;
  }

  function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
  function fmtQte(q){ return (UNITE==="kg" ? q.toFixed(1) : q.toFixed(0)) + " " + UNITE; }

  window.selTaille = function(i, el, t){
    state[i].taille = state[i].taille===t ? null : t;
    el.parentElement.querySelectorAll(".chip").forEach(function(c){c.classList.remove("selected");});
    if(state[i].taille) el.classList.add("selected");
    update();
  };
  window.selCouleur = function(i, el, cl){
    state[i].couleur = state[i].couleur===cl ? null : cl;
    el.parentElement.querySelectorAll(".chip").forEach(function(c){c.classList.remove("selected");});
    if(state[i].couleur) el.classList.add("selected");
    update();
  };
  window.chgQty = function(i, d){
    state[i].quantite = Math.max(0, +(state[i].quantite + d*INC).toFixed(2));
    update();
  };

  function update(){
    var total=0, any=false, recapH="";
    VARIANTES.forEach(function(v, i){
      var el = document.getElementById("var_"+i);
      var q = state[i].quantite;
      document.getElementById("qty_"+i).textContent = fmtQte(q);
      if(q > 0){
        el.classList.add("active"); any=true;
        var st = v.x * q; total += st;
        var desc = v.n;
        if(state[i].taille) desc += " — " + state[i].taille;
        if(state[i].couleur) desc += " — " + state[i].couleur;
        recapH += '<div class="recap-line"><span>'+esc(desc)+' &times; '+fmtQte(q)+'</span><span>'+st.toFixed(2)+' &euro;</span></div>';
      } else {
        el.classList.remove("active");
      }
    });
    var rc = document.getElementById("recapCard");
    if(any){
      recapH += '<div class="recap-line total-line"><span>Total</span><span>'+total.toFixed(2)+' &euro;</span></div>';
      document.getElementById("recap").innerHTML = recapH;
      rc.classList.remove("hidden");
    } else {
      rc.classList.add("hidden");
    }
    var nom = document.getElementById("nom").value.trim();
    document.getElementById("submitBtn").disabled = !(any && nom);
  }

  document.getElementById("nom").addEventListener("input", update);
  document.getElementById("tel").addEventListener("input", update);

  window.soumettre = function(){
    var nom = document.getElementById("nom").value.trim();
    var tel = document.getElementById("tel").value.trim();
    var lignes = [];
    state.forEach(function(s){
      if(s.quantite > 0){
        var l = {v:s.nom, q:s.quantite};
        if(s.taille) l.t = s.taille;
        if(s.couleur) l.c = s.couleur;
        lignes.push(l);
      }
    });
    var data = JSON.stringify({n:nom, p:tel, l:lignes});
    var encoded = btoa(unescape(encodeURIComponent(data)));
    var deepUrl = "coquilles://order?d=" + encodeURIComponent(encoded);

    // Récap texte pour le SMS
    var recap = lignes.map(function(l){
      var d = l.v;
      if(l.t) d += " " + l.t;
      if(l.c) d += " " + l.c;
      return d + " x" + fmtQte(l.q);
    }).join(", ");
    var smsBody = "Commande " + nom + (tel ? " ("+tel+")" : "") + " : " + recap + "\n\n" + deepUrl;
    var smsHref = "sms:" + (TEL_VENDEUR ? TEL_VENDEUR : "") + "?&body=" + encodeURIComponent(smsBody);

    document.getElementById("smsLink").href = smsHref;
    document.getElementById("deepLink").value = deepUrl;
    document.getElementById("formSection").classList.add("hidden");
    document.getElementById("successSection").classList.remove("hidden");
  };

  init();
})();
</script>
</body>
</html>
